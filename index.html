<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"></head>
<body>
  <h1>AI診断テストページ</h1>
  <p>1. 読み込み状況: <span id="status">通信中...</span></p>
  <input id="ai-input" placeholder="何か入力してください">
  <button id="ai-ask-btn">AIに聞く</button>
  <div id="ai-answer" style="border:1px solid #ccc; padding:10px; margin-top:10px;"></div>

<script>
let allData = [];
let GEMINI_API_KEY = "";
// あなたの最新のGAS URLに書き換えてください
const API_URL = "https://script.google.com/macros/s/AKfycbxnivqaTxApYmc8wWPn8BUk5p_caL2n6dPAjau7_8xkva7rLCODuY8idJJe0GJ-dyrw/exec";

console.log("プログラム開始");

// データの読み込み
fetch(API_URL)
.then(res => res.json())
.then(data => {
  console.log("GASからデータ受信:", data);
  allData = data.books;
  GEMINI_API_KEY = data.apiKey;
  document.getElementById("status").innerText = "成功！本棚データを取得しました。";
})
.catch(err => {
  console.error("エラー発生:", err);
  document.getElementById("status").innerText = "失敗: " + err.message;
});

// AIへの命令関数
async function askGemini(userMessage, bookData) {
  // 🔽 モデル名を /models/ から含める書き方に修正
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
  
  const prompt = "テストです。OKと返してください。";

  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }]
    })
  });
  
  const json = await response.json();
  
  if (json.candidates && json.candidates[0].content) {
    return json.candidates[0].content.parts[0].text;
  } else {
    // 詳細なエラーを出すように調整
    throw new Error(json.error ? json.error.message : "AIの応答を解析できませんでした");
  }
}
// ボタン動作
document.getElementById("ai-ask-btn").onclick = async () => {
  const answerEl = document.getElementById("ai-answer");
  answerEl.innerText = "AIが考えています...";
  try {
    const advice = await askGemini("テスト", allData.slice(0, 3));
    answerEl.innerText = advice;
  } catch (e) {
    answerEl.innerText = "AIエラー: " + e.message;
    console.error(e);
  }
};
</script>
</body>
</html>
