<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>

/* 🌿 全体 */
body{
margin:0;
font-family:'Zen Maru Gothic',sans-serif;
background:#ffffff;
color:#333;
}

/* 🌿 ヘッダー */
.header{
text-align:center;
padding:40px 20px;
background:#111;
color:white;
}

.header h1{
font-size:22px;
margin:0;
}

/* 🌿 コンテナ */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* 🔍 検索 */
.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

/* 🏷 タグ */
.tags{
margin:10px 0;
}

.tag{
display:inline-block;
padding:4px 8px;
margin:3px;
border-radius:12px;
background:#eee;
font-size:10px;
cursor:pointer;
}

.tag.active{
background:#222;
color:#fff;
}

/* 🌿 グリッド */
.grid{
display:grid;
gap:16px;
}

@media (max-width:767px){
.grid{ grid-template-columns:repeat(2,1fr); }
}

@media (min-width:768px){
.grid{ grid-template-columns:repeat(3,1fr); }
}

/* 🌿 カード */
.card{
background:white;
border-radius:14px;
padding:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
height:180px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

/* 🆕 */
.new{
position:absolute;
top:8px;
left:8px;
background:#ff4d4d;
color:#fff;
font-size:9px;
padding:2px 6px;
border-radius:6px;
}

/* 表紙 */
.cover{
width:60px;
border-radius:6px;
margin-bottom:6px;
}

/* テキスト */
.title{ font-size:11px;font-weight:bold; }
.author{ font-size:9px;opacity:.6;margin-bottom:6px; }

/* ボタン */
.button{
font-size:9px;
padding:5px 8px;
border-radius:20px;
background:#222;
color:white;
text-decoration:none;
margin-top:4px;
}

.subbtn{
font-size:9px;
margin-top:6px;
cursor:pointer;
opacity:.6;
}

/* リール */
.text{
font-size:11px;
line-height:1.4;
opacity:0;
transform:translateY(10px);
transition:.5s;
}

.text.show{
opacity:1;
transform:translateY(0);
}

/* 🌿 ジブリ風ヘッダー */
.header{
  text-align:center;
  padding:80px 20px 60px;
  color:#2f3e2f;
  background: linear-gradient(180deg, #e6f4ea 0%, #ffffff 100%);
  position:relative;
  overflow:hidden;
}

/* 🌿 ふんわり光 */
.header::before{
  content:"";
  position:absolute;
  top:-50px;
  left:-50px;
  width:200px;
  height:200px;
  background: radial-gradient(circle, rgba(255,255,255,0.8), transparent);
  filter:blur(20px);
}

/* 🌿 タイトル */
.header h1{
  font-size:24px;
  font-weight:700;
  margin:0;
  letter-spacing:1px;
}

/* 🌿 サブ */
.header p{
  margin-top:10px;
  font-size:13px;
  opacity:0.7;
}

</style>
</head>

<body>

<div class="header">
  <h1>物語の世界を、少しだけのぞいてみる</h1>
  <p>気になる一冊が、きっと見つかる</p>
</div>

<div class="container">

  <div class="search">
    <input id="search" placeholder="本を検索...">
  </div>

  <div id="tags" class="tags"></div>

  <div class="grid" id="grid"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzQ8_J-Pyj-qC5nq6GRl1VNVRUuGziXYCnPIGJAssycvoCEeIVtvOPlKWTtp6Svg_qd/exec";

let allData = [];
let activeTag = null;

fetch(API_URL)
.then(res => res.json())
.then(data => {

  allData = data;

  renderTags(data);
  render(data);

});

// 🔍 ひらがな⇄カタカナ
function normalize(text){
  return text.toLowerCase()
    .replace(/[ァ-ン]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0x60)
    );
}

// 検索
document.getElementById("search").addEventListener("input", filter);

// タグ
function renderTags(data){

  const box = document.getElementById("tags");
  const set = new Set();

  data.forEach(d => d.tags.forEach(t => set.add(t)));

  set.forEach(tag => {

    const el = document.createElement("span");
    el.className = "tag";
    el.textContent = tag;

    el.onclick = ()=>{
      activeTag = activeTag === tag ? null : tag;

      document.querySelectorAll(".tag").forEach(t=>t.classList.remove("active"));
      if(activeTag) el.classList.add("active");

      filter();
    };

    box.appendChild(el);
  });
}

// フィルター
function filter(){

  const keyword = normalize(document.getElementById("search").value);

  const filtered = allData.filter(item => {

    const text = normalize(item.title + item.author);

    const matchText = text.includes(keyword);
    const matchTag = !activeTag || item.tags.includes(activeTag);

    return matchText && matchTag;

  });

  render(filtered);
}

// 描画
function render(data){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    // New
    if(item.created){
      const diff = (Date.now() - new Date(item.created)) / (1000*60*60*24);
      if(diff <= 7){
        const badge = document.createElement("div");
        badge.className = "new";
        badge.textContent = "New!";
        card.appendChild(badge);
      }
    }

    grid.appendChild(card);
    createReelCard(card, item);

  });

}

// リール
function createReelCard(card, item){

  let index = 0;
  let interval = null;

  function showIntro(){

    clearInterval(interval);

    card.innerHTML = `
      <img src="${item.image}" class="cover">
      <div class="title">${item.title}</div>
      <div class="author">${item.author}</div>

      <a href="${item.url}" target="_blank" class="button">
        感想記事を読む
      </a>

      <div class="subbtn">▶ 短い紹介を見る</div>
    `;

    card.querySelector(".subbtn").onclick = startReel;
  }

  function startReel(){

    const text = document.createElement("div");
    text.className = "text";
    card.innerHTML = "";
    card.appendChild(text);

    index = 0;

    function show(){

      text.classList.remove("show");

      setTimeout(()=>{

        let content = item.reel[index] || "";

        if(!content.includes("<br>")){
          content = `<div style="font-size:16px;font-weight:bold">${content}</div>`;
        }

        text.innerHTML = content;
        text.classList.add("show");

        index++;

        if(index >= item.reel.length){
          clearInterval(interval);
          setTimeout(showIntro, 2000);
        }

      },200);

    }

    show();
    interval = setInterval(show, 3500);
  }

  showIntro();
}

</script>

</body>
</html>
