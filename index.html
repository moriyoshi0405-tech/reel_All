<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>

/* 🌿 全体 */
body{
margin:0;
font-family:'Zen Maru Gothic',sans-serif;
background:#ffffff;
color:#333;
}

/* 🌿 ローディング */
#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:white;
z-index:999;
}

.spinner{
width:40px;
height:40px;
border:4px solid #eee;
border-top:4px solid #333;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{ transform:rotate(360deg); }
}

/* 🌿 ヘッダー */
.header{
text-align:center;
padding:80px 20px 60px;
color:#2f3e2f;
background: linear-gradient(180deg, #e6f4ea 0%, #ffffff 100%);
position:relative;
overflow:hidden;
}

.header::before{
content:"";
position:absolute;
top:-50px;
left:-50px;
width:200px;
height:200px;
background: radial-gradient(circle, rgba(255,255,255,0.8), transparent);
filter:blur(20px);
}

.header h1{
font-size:24px;
font-weight:700;
margin:0;
}

.header p{
margin-top:10px;
font-size:13px;
opacity:0.7;
}

/* 🌿 コンテナ */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* 🔍 検索 */
.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

/* 🏷 タグ */
.tags{
margin:10px 0;
}

.tag{
display:inline-block;
padding:4px 8px;
margin:3px;
border-radius:12px;
background:#eee;
font-size:10px;
cursor:pointer;
}

.tag.active{
background:#222;
color:#fff;
}

/* 🌿 グリッド */
.grid{
display:grid;
gap:16px;
}

@media (max-width:767px){
.grid{ grid-template-columns:repeat(2,1fr); }
}

@media (min-width:768px){
.grid{ grid-template-columns:repeat(3,1fr); }
}

/* 🌿 カード */
.card{
background:white;
border-radius:14px;
padding:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
height:200px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
text-align:center;
position:relative;
overflow:hidden;
}

/* 🆕 */
.new{
position:absolute;
top:8px;
left:8px;
background:#ff4d4d;
color:#fff;
font-size:9px;
padding:2px 6px;
border-radius:6px;
}

/* 表紙 */
.cover{
width:60px;
border-radius:6px;
margin-bottom:6px;
}

/* テキスト */
.text{
font-size:11px;
line-height:1.6;
opacity:0;
transform:translateY(10px);
transition:.5s;

display:flex;
align-items:center;
justify-content:center;
text-align:center;

height:100%;
}
.author{ font-size:9px;opacity:.6;margin-bottom:4px; }

/* 🔽 カード内タグ */
.card-tags{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:4px;
max-height:32px;
overflow:hidden;
margin-bottom:4px;
}

.card-tag{
font-size:8px;
padding:2px 6px;
border-radius:10px;
color:#333;
white-space:nowrap;
}

/* デフォルト */
.card-tag.default{
background:#eee;
}

/* ボタン */
.button{
font-size:9px;
padding:5px 8px;
border-radius:20px;
background:#222;
color:white;
text-decoration:none;
margin-top:auto;
}

.subbtn{
font-size:9px;
margin-top:6px;
cursor:pointer;
opacity:.6;
}

/* リール */
.text{
font-size:11px;
line-height:1.4;
opacity:0;
transform:translateY(10px);
transition:.5s;
}

.text.show{
opacity:1;
transform:translateY(0);
}

.sort-btn{
padding:6px 12px;
border:none;
border-radius:20px;
background:#eee;
cursor:pointer;
font-size:11px;
}

.sort-btn.active{
background:#222;
color:#fff;
}

#loading.fade-out{
opacity:0;
transition:opacity .6s ease;
pointer-events:none;
}

.loader-inner{
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

/* テキスト */
.loading-text{
font-size:13px;
color:#555;
letter-spacing:1px;
animation:fadeText 1.8s ease-in-out infinite;
}

/* ふわっと点滅 */
@keyframes fadeText{
0%{ opacity:.3; }
50%{ opacity:1; }
100%{ opacity:.3; }
}

.loading-text::after{
content:"";
animation:dots 1.5s steps(3,end) infinite;
}

@keyframes dots{
0%{ content:""; }
33%{ content:"."; }
66%{ content:".."; }
100%{ content:"..."; }
}

/* 🌿 リール背景共通 */
.reel-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
overflow:hidden;
border-radius:14px;
}

/* テキストを前面に */
.text{
position:relative;
z-index:1;
}

/* 🌿 ① 光がふわふわ */
.bg-light{
background:linear-gradient(120deg,#e6f4ea,#ffffff);
}

.bg-light::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle, rgba(255,255,255,0.6), transparent 60%);
animation:floatLight 10s linear infinite;
}

@keyframes floatLight{
0%{ transform:translate(-20%,-20%); }
50%{ transform:translate(20%,20%); }
100%{ transform:translate(-20%,-20%); }
}

/* 🌿 ② 空のゆらぎ */
.bg-sky{
background:linear-gradient(#dbeafe,#ffffff);
}

.bg-sky::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:linear-gradient(45deg, rgba(255,255,255,0.4), transparent);
animation:skyMove 12s linear infinite;
}

@keyframes skyMove{
0%{ transform:translateX(0); }
100%{ transform:translateX(-50%); }
}

/* 🌿 ③ 木漏れ日 */
.bg-forest{
background:linear-gradient(#e6f4ea,#fdfdfd);
}

.bg-forest::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle, rgba(255,255,255,0.5), transparent 70%);
animation:forestLight 8s ease-in-out infinite;
}

@keyframes forestLight{
0%,100%{ transform:translate(0,0); }
50%{ transform:translate(10%,10%); }
}

.title{
  font-size:10px;  /* ←ここを小さくする */
  font-weight:700;
  margin-bottom:4px;
}
  
</style>
</head>

<body>

<!-- 🔽 ローディング -->
<div id="loading">
  <div class="loader-inner">
    <div class="spinner"></div>
    <div class="loading-text">本棚整理中</div>
  </div>
</div>

<div class="header">
  <h1>物語の世界を、少しだけのぞいてみる</h1>
  <p>気になる一冊が、きっと見つかる</p>
</div>

<div class="container">

  <!-- 🔍 検索 -->
  <div class="search">
    <input id="search" placeholder="本を検索...">
  </div>

  <!-- ✨ AI相談エリア（ここを追加） -->
  <div id="ai-section" style="margin-top: 15px; padding: 15px; border: 2px solid #e6f4ea; border-radius: 12px; background: #fafdfb;">
    <p style="font-size: 12px; margin: 0 0 10px 0; font-weight: bold; color: #2f3e2f;">✨ AI司書に相談する</p>
    <div style="display: flex; gap: 8px;">
      <input id="ai-input" placeholder="今の気分は？（例：泣ける本、元気が出る本）" style="flex: 1; padding: 8px; font-size: 11px; border: 1px solid #ddd; border-radius: 6px;">
      <button id="ai-ask-btn" class="sort-btn" style="background: #2f3e2f; color: white; white-space: nowrap;">教える</button>
    </div>
    <div id="ai-answer" style="margin-top: 10px; font-size: 11px; line-height: 1.6; display: none; border-top: 1px dashed #ccc; padding-top: 10px;">
      <!-- ここに回答が出ます -->
    </div>
  </div>

  <div style="margin-bottom:10px;">
  <button id="sortBtn" class="sort-btn">新しい順にする</button>
  </div>

  <div id="tags" class="tags"></div>

  <div class="grid" id="grid"></div>

</div>

<script>

// Gemini APIの設定
const GEMINI_API_KEY = "AIzaSyDfm2EU4Lf4FKqFELDBQnBjLth0tSg_5lA"; // ここを差し替えてください

async function askGemini(userMessage, bookData) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
  
  // 🔽 ここがポイント：reel（紹介文）をAIにしっかり伝える
  const bookList = bookData.map(b => {
    const introduction = b.reel && b.reel.length > 0 ? b.reel.join(' ') : "（紹介文なし）";
    return `・タイトル：${b.title}\n  著者：${b.author}\n  特徴：${introduction}\n  タグ：${b.tags.join(',')}`;
  }).join('\n\n');
  
  const prompt = `
    あなたは私の読書記録を熟知している有能な司書です。
    以下の【本棚リスト】には、私が過去に読んで感銘を受けた本のタイトルと、その時に感じた「紹介文（特徴）」が記されています。

    【本棚リスト】
    ${bookList}

    【ユーザーのリクエスト】
    "${userMessage}"

    【指示】
    1. リクエストの「気分」や「悩み」に最も寄り添える本を、リストの中から1〜2冊選んでください。
    2. 選んだ理由を、リストにある「特徴（紹介文）」の言葉を引用しながら説明してください。
    3. 200文字程度で、温かみのある言葉で回答してください。
  `;

  // 3. 実行（少しだけ書き方を変えて安定させます）
  // 🔽 ここが「body」部分を含む通信の設定です
  const response = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      // ✨安全フィルターを解除する設定（これがないと「空」になりやすいです）
      safetySettings: [
        { "category": "HARM_CATEGORY_HARASSMENT", "threshold": "BLOCK_NONE" },
        { "category": "HARM_CATEGORY_HATE_SPEECH", "threshold": "BLOCK_NONE" },
        { "category": "HARM_CATEGORY_SEXUALLY_EXPLICIT", "threshold": "BLOCK_NONE" },
        { "category": "HARM_CATEGORY_DANGEROUS_CONTENT", "threshold": "BLOCK_NONE" }
      ]
    })
  });
  
  const data = await response.json();

  if (data.candidates && data.candidates[0] && data.candidates[0].content) {
    return data.candidates[0].content.parts[0].text;
  } else {
    console.error("APIエラーの全容:", data);
    throw new Error("AIが回答を拒否したか、準備ができていません。数分待って試してください。");
  }
}

const API_URL = "https://script.google.com/macros/s/AKfycbzQ8_J-Pyj-qC5nq6GRl1VNVRUuGziXYCnPIGJAssycvoCEeIVtvOPlKWTtp6Svg_qd/exec";

let allData = [];
let activeTag = null;
let sortMode = "default";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  allData = data;

  renderTags(data);
  render(data);

  // 🔽 ローディング非表示（変更）
  const loader = document.getElementById("loading");
  loader.classList.add("fade-out");
  
  setTimeout(()=>{
    loader.style.display = "none";
  },600);

});



// 🎨 タグカラー定義
const tagColors = {
  "恋愛小説": "#ffe0e6",
  "海外文学": "#e0ecff",
  "長編小説": "#e6f7e6",
  "短編小説": "#fff4e0",
  "エッセイ": "#f0e6ff"
};

document.getElementById("ai-ask-btn").onclick = async () => {
  const input = document.getElementById("ai-input").value;
  const answerEl = document.getElementById("ai-answer");
  
  if (!input) return alert("気分を入力してください！");

  answerEl.style.display = "block";
  answerEl.innerHTML = "AI司書が本棚を確認中...";

try {
    // 🔽 ここを修正：allData をそのまま渡さず、最初の3冊に絞る
    const testData = allData.slice(0, 3); 
    const advice = await askGemini(input, testData);
    
    answerEl.innerHTML = `<strong>AIの提案：</strong><br>${advice}`;
  } catch (e) {
    answerEl.innerHTML = `エラー詳細: ${e.message}`;
    console.error("詳細エラー:", e);
  }
};

// ソート
document.getElementById("sortBtn").onclick = () => {

  sortMode = sortMode === "default" ? "new" : "default";

  const btn = document.getElementById("sortBtn");

  if(sortMode === "new"){
    btn.textContent = "表示順に戻す";
    btn.classList.add("active");
  }else{
    btn.textContent = "新しい順にする";
    btn.classList.remove("active");
  }

  filter();
};

// 検索
document.getElementById("search").addEventListener("input", filter);

function normalize(text){
  return text.toLowerCase()
    .replace(/[ァ-ン]/g, s =>
      String.fromCharCode(s.charCodeAt(0) - 0x60)
    );
}

// タグ生成
function renderTags(data){

  const box = document.getElementById("tags");
  const set = new Set();

  data.forEach(d => d.tags.forEach(t => set.add(t)));

  set.forEach(tag => {

    const el = document.createElement("span");
    el.className = "tag";
    el.textContent = tag;

    el.onclick = ()=>{
      activeTag = activeTag === tag ? null : tag;

      document.querySelectorAll(".tag").forEach(t=>t.classList.remove("active"));
      if(activeTag) el.classList.add("active");

      filter();
    };

    box.appendChild(el);
  });
}

// フィルター
function filter(){

  const keyword = normalize(document.getElementById("search").value);

  let filtered = allData.filter(item => {

    const text = normalize(item.title + item.author);

    const matchText = text.includes(keyword);
    const matchTag = !activeTag || item.tags.includes(activeTag);

    return matchText && matchTag;

  });

  if(sortMode === "new"){
    filtered.sort((a,b)=> new Date(b.created) - new Date(a.created));
  }else{
    filtered.sort((a,b)=> a.order - b.order);
  }

  render(filtered);

}

// 描画
function render(data){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    grid.appendChild(card);
    createReelCard(card, item);

  });

}

// カード生成
function createReelCard(card, item){

  function showIntro(){

    const isNew = item.created &&
      ((Date.now() - new Date(item.created)) / (1000*60*60*24) <= 7);

    const tagsHTML = item.tags.map(t => {

      const color = tagColors[t] || "#eee";
    
      return `<span class="card-tag"
                style="background:${color}">
                ${t}
              </span>`;
    
    }).join("");

    card.innerHTML = `
      ${isNew ? '<div class="new">New!</div>' : ''}

      <img src="${item.image}" class="cover">
      <div class="title">${item.title}</div>
      <div class="author">${item.author}</div>

      <div class="card-tags">${tagsHTML}</div>

      <a href="${item.url}" target="_blank" class="button">
        感想記事を読む
      </a>

      <div class="subbtn">▶ 短い紹介を見る</div>
    `;

    card.querySelector(".subbtn").onclick = startReel;
  }

function startReel(){

  const text = document.createElement("div");
  text.className = "text";

  // 🔽 背景をランダム生成
  const bg = document.createElement("div");
  bg.className = "reel-bg";

  const bgTypes = ["bg-light","bg-sky","bg-forest"];
  const randomBg = bgTypes[Math.floor(Math.random()*bgTypes.length)];
  bg.classList.add(randomBg);

  card.innerHTML = "";
  card.appendChild(bg);   // ← 背景
  card.appendChild(text); // ← テキスト

  let index = 0;

  const reelArray = typeof item.reel === "string"
    ? item.reel.split(",")
    : item.reel;

  function show(){

    text.classList.remove("show");

    setTimeout(()=>{

      let content = reelArray[index] || "";

      if(!content.includes("<br>")){
        content = `<div style="font-size:16px;font-weight:bold">${content}</div>`;
      }

      text.innerHTML = content;
      text.classList.add("show");

      index++;

      if(index >= reelArray.length){
        clearInterval(interval);
        setTimeout(showIntro, 2000);
      }

    },200);

  }

  show();
  const interval = setInterval(show, 3500);
}
  showIntro();
}

</script>

</body>
</html>
